ai_usage_summary: |
  Used Gemini (Antigravity IDE) for code review and architectural discussion.
  JD parsing was pre-computed using Groq API (llama-3.3-70b) and cached to
  data/jd_intent_cache.json. The ranking step itself uses no network calls —
  only local CPU models (sentence-transformers, cross-encoder). No candidate
  data was fed to any LLM.

methodology_summary: |
  5-stage hybrid ranker with negative vector anchoring. Stage 1: BM25
  pre-filter on raw text reduces 100K candidates to top 2000 in ~30s.
  Stage 2: Dense skill verification using cosine similarity to catch keyword
  stuffers; trust score derived from verified vs. claimed skills. Stage 3:
  Programmatic disqualifiers (ghost candidates, title chasers, excessive
  notice period). Stage 4: Hybrid retrieval using RRF fusion of BM25 + FAISS
  with negative semantic anchor penalty. Stage 5: Cross-Encoder rerank on
  top 300, blended with Trust Score, GitHub activity, platform behavioral
  signals, and education tier into a final weighted score. Runtime: ~90
  seconds on 8-core CPU.

