ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini to optimize the pipeline logic for processing 100,000 candidates efficiently within the 5-minute constraint by implementing BM25 pre-filtering and removing API calls to adhere to offline constraints.

methodology_summary: |
  Optimized hybrid search ranker. Used BM25 on raw candidate strings to pre-filter the 100,000 candidates down to the top 2000 in under 30 seconds. Applied advanced semantic lie-detection and trust-scoring algorithms on this subset using sentence-transformers, followed by a Cross-Encoder re-rank. The final offline heuristic combined the Cross-Encoder score with Behavioral Vibe and Trust Score to extract the Top 100 candidates.

